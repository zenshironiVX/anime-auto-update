name: Auto Update Anime

on:
  schedule:
    - cron: '0 */3 * * *' # รันทุกๆ 3 ชั่วโมง
  workflow_dispatch: # อนุญาตให้กดรันเองได้จากหน้าเว็บ GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ติดตั้งไฟล์ requirements เดิมของคุณ
          pip install -r requirements.txt
          
          # ติดตั้งไลบรารีที่บังคับใช้ใน V15 (เผื่อตกหล่นใน requirements.txt)
          pip install playwright beautifulsoup4 aiohttp curl_cffi
          
          # 🚨 ส่วนที่สำคัญที่สุดสำหรับ GitHub Actions 🚨
          # สั่งให้ Playwright โหลดเบราว์เซอร์ Chromium เข้าเซิร์ฟเวอร์
          playwright install chromium
          # ติดตั้ง System Dependencies ของ Ubuntu Linux ที่ Chrome จำเป็นต้องใช้
          playwright install-deps chromium

      - name: Run Scrapper and Push to API
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python scraper_anime.py --auto
