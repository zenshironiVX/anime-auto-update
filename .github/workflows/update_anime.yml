name: Auto Update Anime

on:
  schedule:
    - cron: '0 */3 * * *' # รันทุกๆ 3 ชั่วโมง
  workflow_dispatch: # อนุญาตให้กดรันเองได้จากหน้าเว็บ GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapper and Push to API
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python scraper_anime.py --auto
